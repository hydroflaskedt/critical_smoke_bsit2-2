<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/css/login.css">
    <script src="/js/login.js" defer></script>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="container">
        <img id="logo" src="/images/logo.png">
        <div id="login-div">
            <h1 id="header-text">login</h1>
            
            <!-- Error message display -->
            <div id="error-message" style="
                display: none;
                background: #8b1a1a;
                color: #ff6b6b;
                padding: 12px 16px;
                border-radius: 6px;
                margin-bottom: 16px;
                text-align: center;
                font-weight: 600;
                border-left: 4px solid #ff6b6b;
            "></div>
            
            <input type="text" id="username-login" placeholder=" User Name">
            <input type="password" id="password-login" placeholder=" Enter password">
            <button id="login-btn">Login</button>
            <span id="footer-txt">dont have an account? <a id="footer-link" href="/signup">Sign Up</a></span>
        </div>
    </div>
</body>
</html>
