<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/homepage.css">
    <link rel="stylesheet" href="/css/publishFlow.css">
    <script src="/js/homepage.js" defer></script>
    <title>Upload Game Files</title>
</head>
<body>
    <div class="container">
        <div th:replace="~{homepage :: navbar}"></div>

        <div class="publish-flow-container">

            <!-- Progress Indicator -->
            <div class="progress-section">
                <div class="progress-item completed">
                    <div class="progress-dot">✓</div>
                    <span>Details</span>
                </div>
                <div class="progress-line completed"></div>
                <div class="progress-item completed">
                    <div class="progress-dot">✓</div>
                    <span>Upload Thumbnails</span>
                </div>
                <div class="progress-line completed"></div>
                <div class="progress-item active">
                    <div class="progress-dot">3</div>
                    <span>Upload Game Files</span>
                </div>
            </div>

            <!-- Game Files Section -->
            <div class="flow-content">
                <h2>Upload Game Files</h2>

                <form action="/uploadGameFiles" method="post" id="fileForm">

                    <input
                        type="hidden"
                        id="game-file-name"
                        name="gameFileName"
                        value=""
                    >

                    <div class="file-upload-box">
                        <label>GAME FILES</label>
                        <div class="file-preview" id="filePreview">
                            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </div>
                        <input
                            id="game-file"
                            type="file"
                            accept=".zip,.exe"
                            hidden
                        >
                        <button
                            type="button"
                            class="btn-upload-large"
                            onclick="document.getElementById('game-file').click()"
                        >
                            Upload Files
                        </button>
                        <p id="selected-file" style="text-align: center; color: #aaa; margin-top: 10px;">No file selected</p>
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn-back" onclick="window.history.back()">Back</button>
                        <button type="submit" class="btn-submit">Submit Request</button>
                    </div>

                </form>
            </div>

        </div>
    </div>

    <script>
        const fileInput = document.getElementById("game-file");
        const fileNameDisplay = document.getElementById("selected-file");
        const hiddenFileName = document.getElementById("game-file-name");

        fileInput.addEventListener("change", function() {
            if (this.files.length > 0) {
                fileNameDisplay.textContent = "Selected: " + this.files[0].name;
                hiddenFileName.value = this.files[0].name;
            } else {
                fileNameDisplay.textContent = "No file selected";
                hiddenFileName.value = "";
            }
        });
    </script>

    <script th:if="${error == 'missingFile'}">
        alert("Please select a game file before publishing.");
    </script>
</body>
</html>
