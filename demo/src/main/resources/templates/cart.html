<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/homepage.css">
    <link rel="stylesheet" href="/css/cart.css">
    <script src="/js/homepage.js" defer></script>
    <title>Shopping Cart</title>
</head>
<body>
<div class="container">
    <div th:replace="~{homepage :: navbar}"></div>

    <div class="cart-wrapper">

        <!-- ===== LEFT: Cart Items ===== -->
        <div class="cart-left">
            <div class="cart-header">
                <h2>My Cart</h2>
                <form action="/cart/remove-all" method="post" style="display:inline;">
                    <button type="submit" class="remove-all-btn"
                            th:if="${!cartItems.isEmpty()}">Remove All</button>
                </form>
            </div>

            <div th:if="${cartItems.isEmpty()}" class="cart-empty">
                Your cart is empty. <a href="/" style="color:#ffc300;">Continue shopping</a>
            </div>

            <div th:each="item : ${cartItems}" class="cart-item">
                <img th:src="${item.coverImage}" alt="cover">
                <div class="item-info">
                    <h3 th:text="${item.gameTitle}"></h3>
                    <p class="item-price">PHP <span th:text="${item.gamePrice}"></span></p>
                </div>
                <div class="item-actions">
                    <button class="item-view-btn"
                            th:onclick="|window.location.href='/game/${item.gameId}'|">View Game</button>
                    <form th:action="'/cart/remove/' + ${item.gameId}" method="post" style="display:inline;">
                        <button type="submit" class="item-remove-btn">Remove</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- ===== RIGHT: Total + Summary ===== -->
        <div class="cart-right" th:if="${!cartItems.isEmpty()}">

            <!-- Total card -->
            <div class="total-card">
                <h3 class="total-card-title">Total</h3>
                <div class="total-row">
                    <span class="total-label">Subtotal</span>
                    <span class="total-amount"
                          th:text="'PHP ' + ${#numbers.formatDecimal(discountedTotal, 1, 2)}"></span>
                </div>
            </div>

            <!-- Summary card -->
            <div class="summary-card">
                <h3 class="summary-card-title">Summary</h3>

                <!-- ── Voucher section: only shown when no voucher is applied yet ── -->
                <div class="voucher-section" th:if="${appliedVoucher == null}">

                    <!-- Trigger row -->
                    <div class="voucher-trigger" id="voucherTrigger" onclick="toggleVoucher()">
                        <span class="voucher-trigger-icon">🎟</span>
                        <span class="voucher-trigger-label">Digital Voucher</span>
                        <span class="voucher-trigger-chevron" id="voucherChevron">⌄</span>
                    </div>

                    <!-- Dropdown panel -->
                    <div class="voucher-panel" id="voucherPanel" style="display:none;">

                        <!-- Voucher cards – one per unused voucher -->
                        <div th:each="v : ${vouchers}" class="voucher-card-wrap">
                            <form action="/cart/apply-voucher" method="post">
                                <input type="hidden" name="voucherCode" th:value="${v.code}">
                                <button type="submit" class="voucher-card">
                                    <span class="voucher-card-icon">🎟</span>
                                    <span class="voucher-card-body">
                                        <span class="voucher-card-name"
                                              th:text="${v.discountPercent} + '% OFF New User Discount'"></span>
                                        <span class="voucher-card-code" th:text="${v.code}"></span>
                                    </span>
                                    <span class="voucher-card-radio"></span>
                                </button>
                            </form>
                        </div>

                        <div th:if="${vouchers == null or vouchers.isEmpty()}" class="voucher-empty">
                            No vouchers available.
                        </div>

                        <!-- Manual code entry fallback -->
                        <form action="/cart/apply-voucher" method="post" class="voucher-enter-form">
                            <span class="voucher-enter-icon">🎟</span>
                            <input type="text" name="voucherCode"
                                   class="voucher-enter-input" placeholder="Enter Code">
                            <button type="submit" class="voucher-enter-submit">›</button>
                        </form>
                    </div>

                    <!-- Error message if code was invalid/used -->
                    <div th:if="${voucherError != null}" class="voucher-error"
                         th:text="${voucherError}"></div>
                </div>

                <!-- ── Applied voucher state ── -->
                <div class="voucher-applied-row" th:if="${appliedVoucher != null}">
                    <span class="voucher-applied-icon">🎟</span>
                    <span class="voucher-applied-text"
                          th:text="${discountPercent} + '% OFF New User Discount'"></span>
                    <a href="/cart/remove-voucher" class="voucher-remove-link">Remove</a>
                </div>

                <!-- ── Breakdown rows ── -->
                <div class="breakdown">
                    <!-- Discount/Coupon line: only when a voucher is applied -->
                    <div class="breakdown-row" th:if="${discountPercent != null and discountPercent > 0}">
                        <span>Discount/Coupon</span>
                        <span class="breakdown-discount"
                              th:text="'PHP -' + ${#numbers.formatDecimal(total - discountedTotal, 1, 2)}"></span>
                    </div>

                    <!-- Original total (struck through) when discounted -->
                    <div class="breakdown-row" th:if="${discountPercent != null and discountPercent > 0}">
                        <span th:text="${cartItems.size()} + ' products'"></span>
                        <span class="breakdown-strike"
                              th:text="'PHP ' + ${#numbers.formatDecimal(total, 1, 2)}"></span>
                    </div>

                    <!-- Final total (always shown) -->
                    <div class="breakdown-row">
                        <span th:text="${cartItems.size()} + ' products'"></span>
                        <span class="breakdown-final"
                              th:text="'PHP ' + ${#numbers.formatDecimal(discountedTotal, 1, 2)}"></span>
                    </div>
                </div>

                <a href="/checkout" class="checkout-btn">Proceed to checkout</a>
            </div>

        </div>

        <!-- Empty-cart right placeholder -->
        <div class="cart-right" th:if="${cartItems.isEmpty()}">
            <div class="summary-card">
                <p style="color:#888; text-align:center; padding: 20px 0;">
                    Add items to your cart to proceed.
                </p>
            </div>
        </div>

    </div>
</div>

<script>
    function toggleVoucher() {
        const panel   = document.getElementById('voucherPanel');
        const chevron = document.getElementById('voucherChevron');
        const open    = panel.style.display === 'block';
        panel.style.display = open ? 'none' : 'block';
        chevron.textContent  = open ? '⌄' : '⌃';
    }
</script>
</body>
</html>
