<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/homepage.css">
    <link rel="stylesheet" href="/css/cart.css">
    <script src="/js/homepage.js" defer></script>
    <title>Shopping Cart</title>
</head>
<body>
    <div class="container">
        <div th:replace="~{homepage :: navbar}"></div>

        <div class="cart-wrapper">

            <!-- LEFT: CART ITEMS -->
            <div class="cart-left">
                <div class="cart-header">
                    <h2>My Cart</h2>
                    <form action="/cart/remove-all" method="post" style="display:inline;">
                        <button
                            type="submit"
                            class="remove-all"
                            th:if="${!cartItems.isEmpty()}">
                            Remove All
                        </button>
                    </form>
                </div>

                <!-- Empty cart message -->
                <div th:if="${cartItems.isEmpty()}" class="empty-cart">
                    Your cart is empty
                </div>

                <!-- Cart items -->
                <div th:if="${!cartItems.isEmpty()}">
                    <div class="cart-item" th:each="item : ${cartItems}">
                        <img th:src="${item.coverImage}" alt="cover">
                        <div class="item-info">
                            <h3 th:text="${item.gameTitle}"></h3>
                            <p class="item-price">PHP <span th:text="${item.gamePrice}"></span></p>
                        </div>
                        <div class="item-actions">
                            <button
                                class="view-btn"
                                th:onclick="|window.location.href='/game/${item.gameId}'|">
                                View Game
                            </button>
                            <form
                                th:action="'/cart/remove/' + ${item.gameId}"
                                method="post"
                                style="display: inline;">
                                <button type="submit" class="remove-btn">Remove</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: TOTAL & CHECKOUT -->
            <div class="cart-right" th:if="${!cartItems.isEmpty()}">

                <!-- Total card -->
                <div class="total-card">
                    <h2>Total</h2>
                    <div class="subtotal">
                        <span>Subtotal</span>
                        <span class="subtotal-price">
                            PHP <span th:text="${#numbers.formatDecimal(discountedTotal, 1, 2)}"></span>
                        </span>
                    </div>
                </div>

                <!-- Summary card -->
                <div class="summary-card">
                    <h2>Summary</h2>

                    <!-- Voucher dropdown trigger -->
                    <div class="voucher-dropdown" th:if="${appliedVoucher == null}">
                        <button type="button" class="voucher-trigger" id="voucherTrigger" onclick="toggleVoucherPanel()">
                            <span class="voucher-trigger-icon">🎟</span>
                            <span class="voucher-trigger-label">Digital Voucher</span>
                            <span class="voucher-trigger-chevron" id="voucherChevron">⌄</span>
                        </button>

                        <!-- Panel: voucher cards + enter-code fallback -->
                        <div class="voucher-panel" id="voucherPanel" style="display:none;">

                            <form th:each="v : ${vouchers}"
                                  action="/cart/apply-voucher"
                                  method="post"
                                  class="voucher-card-form">
                                <input type="hidden" name="voucherCode" th:value="${v.code}">
                                <button type="submit" class="voucher-card">
                                    <span class="voucher-card-icon">🎟</span>
                                    <span class="voucher-card-info">
                                        <span class="voucher-card-title"
                                              th:text="${v.discountPercent} + '% OFF New User Discount'"></span>
                                        <span class="voucher-card-sub" th:text="${v.code}"></span>
                                    </span>
                                    <span class="voucher-card-radio"></span>
                                </button>
                            </form>

                            <div th:if="${vouchers == null or vouchers.isEmpty()}" class="voucher-panel-empty">
                                No vouchers available right now.
                            </div>

                            <!-- Enter code fallback -->
                            <form action="/cart/apply-voucher" method="post" class="voucher-code-form">
                                <input
                                    type="text"
                                    name="voucherCode"
                                    class="voucher-code-input"
                                    placeholder="Enter Code">
                                <button type="submit" class="voucher-code-submit">›</button>
                            </form>
                        </div>

                        <!-- Voucher error message (invalid/used code) -->
                        <div th:if="${voucherError != null}" class="voucher-error-msg" th:text="${voucherError}"></div>
                    </div>

                    <!-- Voucher applied: show it as the selected card + remove option -->
                    <div class="voucher-applied-block" th:if="${appliedVoucher != null}">
                        <div class="voucher-card voucher-card-selected">
                            <span class="voucher-card-icon">🎟</span>
                            <span class="voucher-card-info">
                                <span class="voucher-card-title"
                                      th:text="${discountPercent} + '% OFF New User Discount'"></span>
                                <span class="voucher-card-sub" th:text="${appliedVoucher}"></span>
                            </span>
                            <a href="/cart/remove-voucher" class="voucher-remove-link">Remove</a>
                        </div>
                    </div>

                    <!-- Breakdown -->
                    <div class="summary-breakdown">
                        <div class="summary-row" th:if="${discountPercent != null and discountPercent > 0}">
                            <span>Discount/Coupon</span>
                            <span class="summary-discount-amount"
                                  th:text="'PHP -' + ${#numbers.formatDecimal(total - discountedTotal, 1, 2)}"></span>
                        </div>
                        <div class="summary-row" th:if="${discountPercent != null and discountPercent > 0}">
                            <span th:text="${cartItems.size()} + ' products'"></span>
                            <span class="summary-row-strike"
                                  th:text="'PHP ' + ${#numbers.formatDecimal(total, 1, 2)}"></span>
                        </div>
                        <div class="summary-row">
                            <span th:text="${cartItems.size()} + ' products'"></span>
                            <span class="summary-row-final"
                                  th:text="'PHP ' + ${#numbers.formatDecimal(discountedTotal, 1, 2)}"></span>
                        </div>
                    </div>

                    <a href="/checkout" class="checkout-btn">Proceed to checkout</a>
                </div>

            </div>

        </div>
    </div>

    <script>
        function toggleVoucherPanel() {
            const panel = document.getElementById('voucherPanel');
            const chevron = document.getElementById('voucherChevron');
            const isOpen = panel.style.display === 'block';
            panel.style.display = isOpen ? 'none' : 'block';
            chevron.textContent = isOpen ? '⌄' : '⌃';
        }
    </script>
</body>
</html>
