spring.application.name=demo

spring.datasource.url=jdbc:mysql://localhost:3306/critical_smoke_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=RootPass123!

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=300MB

